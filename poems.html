<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>創作詩</title>
    <style>
        body {
            font-family: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", serif;
            color: #333;
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
            /* ページ内リンクで移動した際、フワッとスクロールさせる設定 */
            scroll-behavior: smooth; 
        }

        /* ▼ 追加：カテゴリメニューのスタイル ▼ */
        .categoryMenu {
            display: flex;             /* 要素を横並びにする魔法の呪文です */
            justify-content: center;   /* 横並びにしたものを「中央寄せ」にします */
            gap: 40px;                 /* メニュー同士の隙間を40px空けます */
            list-style: none;          /* リストの「・」を消します */
            padding: 0;
            margin: 0 0 50px 0;        /* 下に50pxの余白をとり、コンテンツとの距離を保ちます */
            border-bottom: 1px solid #eaeaea; /* 恵文社風に、下に薄い線を引いて区切ります */
            padding-bottom: 20px;
        }

        .categoryMenu a {
            text-decoration: none;
            color: #888;               /* 少し控えめなグレーにして上品さを出します */
            font-size: 1.1em;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .categoryMenu a:hover {
            color: #111;               /* マウスが乗ると色が濃くなります */
        }
        /* ▲ 追加ここまで ▲ */

        /* 既存のレイアウトCSS（そのまま） */
        .M_categoryList {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            padding: 0;
            list-style: none;
        }

        .M_categoryList a {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .M_cl_imgWrap {
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            aspect-ratio: 1 / 1; 
        }

        .M_categoryList a:hover .M_cl_imgWrap {
            transform: translateY(-8px);
            box-shadow: 0 12px 16px rgba(0, 0, 0, 0.2);
        }

        .poem-image {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            vertical-align: bottom;
            transition: transform 0.5s ease;
        }

        .M_categoryList a:hover .poem-image {
            transform: scale(1.05); 
        }

        .M_cl_detail {
            margin-top: 15px;
            text-align: center;
        }

        .M_cl_detail h3 {
            margin: 0;
            font-size: 1.1em;
            letter-spacing: 0.05em;
        }

        /* セクション間の余白調整 */
        section {
            margin-bottom: 60px;
        }
    </style>
</head>
<body>
    <h1 style="text-align: center; margin-bottom: 40px;">Portfolio</h1>
    
    <nav>
        <ul class="categoryMenu">
            <li><a href="index.html">トップ</a></li>
            <li><a href="projects.html">開発プロジェクト</a></li>
            <li><a href="poems.html">創作詩</a></li>
        </ul>
    </nav>

    <section id="poems">
        <h2>詩</h2>
        
        <ul class="M_categoryList">
            <li>
                <a href="evans_and_rain.html">
                    <div class="M_cl_imgWrap">
                        <img src="images/evans_and_rain.png" alt="エヴァンスと雨" class="poem-image">
                    </div>
                    <div class="M_cl_detail">
                        <h3>エヴァンスと雨</h3>
                    </div>
                </a>
            </li>
        </ul>
    </section>

</body>
</html>
